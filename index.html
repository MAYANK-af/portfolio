<title>Mayank Yadav — Agentic AI Engineer & Cinematic UI Architect</title>
<style>
/* ========== 1. SCROLL PROGRESS BAR ========== */
#scroll-progress{position:fixed;top:0;left:0;width:0%;height:3px;z-index:9999;pointer-events:none;background:linear-gradient(90deg,#06b6d4,#8b5cf6,#ec4899,#06b6d4);background-size:300% 100%;animation:shimmer-progress 3s linear infinite;box-shadow:0 0 12px #8b5cf680,0 0 24px #06b6d440;transition:width 0.05s linear}
@keyframes shimmer-progress{0%{background-position:0% 50%}100%{background-position:300% 50%}}

/* ========== 2. GLOW ACCENT BORDERS ON CARDS ========== */
@property --glow-angle{syntax:"<angle>";initial-value:0deg;inherits:false}
@keyframes glow-rotate{0%{--glow-angle:0deg}100%{--glow-angle:360deg}}
section [class*="border"][class*="rounded"],
a[class*="border"][class*="rounded"],
article{
  position:relative;
  overflow:hidden;
  transition:border-color 0.3s,box-shadow 0.3s;
}
section [class*="border"][class*="rounded"]:hover,
a[class*="border"][class*="rounded"]:hover,
article:hover{
  border-color:transparent!important;
  background-image:linear-gradient(hsl(var(--card)),hsl(var(--card))),linear-gradient(var(--glow-angle),#06b6d4,#8b5cf6,#ec4899,#06b6d4);
  background-origin:border-box;
  background-clip:padding-box,border-box;
  animation:glow-rotate 3s linear infinite;
  box-shadow:0 0 30px rgba(139,92,246,0.15),0 0 50px rgba(6,182,212,0.1);
}

/* ========== 3. ANIMATED GRADIENT MESH BACKGROUND ========== */
#gradient-mesh{position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:0.45}
#gradient-mesh::before,#gradient-mesh::after,#gradient-mesh-3{content:"";position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
#gradient-mesh::before{width:60vw;height:60vh;top:-10%;left:-10%;background:radial-gradient(circle,rgba(30,27,75,0.75) 0%,transparent 70%);animation:mesh-drift-1 25s ease-in-out infinite alternate}
#gradient-mesh::after{width:50vw;height:50vh;bottom:-15%;right:-15%;background:radial-gradient(circle,rgba(12,74,110,0.75) 0%,transparent 70%);animation:mesh-drift-2 20s ease-in-out infinite alternate-reverse}
#gradient-mesh-3{width:45vw;height:45vh;top:25%;left:25%;background:radial-gradient(circle,rgba(76,29,149,0.45) 0%,transparent 70%);animation:mesh-drift-3 22s ease-in-out infinite alternate}
@keyframes mesh-drift-1{0%{transform:translate(0,0) scale(1)}50%{transform:translate(8vw,12vh) scale(1.15)}100%{transform:translate(-4vw,4vh) scale(0.95)}}
@keyframes mesh-drift-2{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-10vw,-6vh) scale(0.85)}100%{transform:translate(4vw,-12vh) scale(1.05)}}
@keyframes mesh-drift-3{0%{transform:translate(0,0) scale(1)}50%{transform:translate(6vw,-8vh) scale(1.1)}100%{transform:translate(-8vw,6vh) scale(0.95)}}

/* ========== 4. SECTION FADE-IN ON SCROLL ========== */
.reveal-section{opacity:0;transform:translateY(40px);transition:opacity 0.8s cubic-bezier(0.16,1,0.3,1),transform 0.8s cubic-bezier(0.16,1,0.3,1)}
.reveal-section.revealed{opacity:1;transform:translateY(0)}
.reveal-section.revealed>*:nth-child(1){transition-delay:0s}
.reveal-section.revealed>*:nth-child(2){transition-delay:0.08s}
.reveal-section.revealed>*:nth-child(3){transition-delay:0.16s}
.reveal-section.revealed>*:nth-child(4){transition-delay:0.24s}

/* ========== 5. TEXT REVEAL ANIMATION FOR HEADINGS ========== */
.text-reveal{overflow:hidden;display:inline-block}
.text-reveal-inner{display:inline-block;transform:translateY(110%);transition:transform 0.7s cubic-bezier(0.16,1,0.3,1)}
.text-reveal.revealed .text-reveal-inner{transform:translateY(0)}

/* ========== 6. MAGNETIC HOVER ========== */
[data-magnetic]{transition:transform 0.3s cubic-bezier(0.33,1,0.68,1)}

/* ========== 7. NOISE TEXTURE OVERLAY ========== */
#noise-overlay{position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0.035;mix-blend-mode:overlay}

/* ========== 8. PAGE LOAD TRANSITION ========== */
#page-curtain{position:fixed;inset:0;z-index:10000;background:#060608;display:flex;align-items:center;justify-content:center;transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1),transform 0.6s cubic-bezier(0.16,1,0.3,1)}
#page-curtain.lift{opacity:0;transform:translateY(-100%);pointer-events:none}
#page-curtain .loader-ring{width:40px;height:40px;border:2px solid #ffffff15;border-top-color:#8b5cf6;border-radius:50%;animation:loader-spin 0.8s linear infinite}
@keyframes loader-spin{to{transform:rotate(360deg)}}

/* BONUS: Smooth glow on nav */
nav,header,[class*="backdrop-blur"]{border-bottom:1px solid #ffffff08!important;box-shadow:0 1px 30px #06060880}

/* Glassmorphism Theme Fixes */
.theme-dark{
  --bg-base:#060608!important;
  --bg-surface:#0b0b0e!important;
  --card:0 0% 5%!important;
  background-color:#060608!important;
}
.theme-light{
  --bg-base:#f8f6f0!important;
  --bg-surface:#f0ede4!important;
  background-color:#f8f6f0!important;
}
.theme-dark article,
.theme-dark section [class*="border"][class*="rounded"],
.theme-dark a[class*="border"][class*="rounded"] {
  background-color: rgba(11, 11, 14, 0.65) !important;
  backdrop-filter: blur(16px);
  border-color: rgba(255, 255, 255, 0.04) !important;
  position: relative;
  overflow: hidden;
}
.theme-light article,
.theme-light section [class*="border"][class*="rounded"],
.theme-light a[class*="border"][class*="rounded"] {
  background-color: rgba(240, 237, 228, 0.65) !important;
  backdrop-filter: blur(16px);
  border-color: rgba(0, 0, 0, 0.06) !important;
  position: relative;
  overflow: hidden;
}

/* Mouse spotlight glow via ::before pseudo-elements */
.theme-dark article::before,
.theme-dark section [class*="border"][class*="rounded"]::before,
.theme-dark a[class*="border"][class*="rounded"]::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s ease;
  background: radial-gradient(350px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(139, 92, 246, 0.08), transparent 80%);
}
.theme-light article::before,
.theme-light section [class*="border"][class*="rounded"]::before,
.theme-light a[class*="border"][class*="rounded"]::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s ease;
  background: radial-gradient(350px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(6, 182, 212, 0.06), transparent 80%);
}

article:hover::before,
section [class*="border"][class*="rounded"]:hover::before,
a[class*="border"][class*="rounded"]:hover::before {
  opacity: 1;
}

/* Ensure children stay above spotlight */
article > *, 
section [class*="border"][class*="rounded"] > *,
a[class*="border"][class*="rounded"] > * {
  position: relative;
  z-index: 1;
}

/* Light theme adjustments */
.theme-light #gradient-mesh{opacity:0.18}
.theme-light #noise-overlay{opacity:0.02;mix-blend-mode:multiply}
.theme-light #page-curtain{background:#f8f6f0}
.theme-light #scroll-progress{box-shadow:0 0 12px #8b5cf640}



/* ========== 3D FLOATING SPHERES IN LAST 3 SECTIONS ========== */
.sphere-3d {
  position: absolute;
  border-radius: 50%;
  /* Boosted opacity for high visual contrast */
  background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.08) 40%, rgba(255, 255, 255, 0.02) 85%, rgba(255, 255, 255, 0) 100%);
  box-shadow: inset -6px -6px 16px rgba(255, 255, 255, 0.05), inset 4px 4px 12px rgba(255, 255, 255, 0.12), 0 0 30px rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  pointer-events: none;
  z-index: 0;
  animation: float-slow 15s ease-in-out infinite alternate;
}
@keyframes float-slow {
  0% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(25px, -25px) scale(1.05); }
  100% { transform: translate(-15px, 20px) scale(0.95); }
}
@keyframes float-slower {
  0% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(-30px, 30px) scale(0.95); }
  100% { transform: translate(20px, -20px) scale(1.05); }
}
</style>

<body>

<!-- Page Load Curtain -->
<div id="page-curtain"><div class="loader-ring"></div></div>

<!-- Scroll Progress Bar -->
<div id="scroll-progress"></div>

<!-- Animated Gradient Mesh Background -->
<div id="gradient-mesh"><div id="gradient-mesh-3"></div></div>

<!-- Noise Texture Overlay -->
<svg id="noise-overlay" viewBox="0 0 512 512" preserveAspectRatio="none" style="width:100%;height:100%"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#noiseFilter)"/></svg>

<noscript>You need to enable JavaScript to run this app.</noscript>
<div id="root"></div>

<script>
// ===== 1. SCROLL PROGRESS BAR =====
(function(){
  var bar=document.getElementById("scroll-progress");
  function update(){
    var h=document.documentElement.scrollHeight-window.innerHeight;
    var p=h>0?(window.scrollY/h)*100:0;
    bar.style.width=p+"%";
  }
  window.addEventListener("scroll",update,{passive:true});
  update();
})();

// ===== 4. SECTION FADE-IN ON SCROLL =====
(function(){
  function initReveal(){
    var root=document.getElementById("root");
    if(!root||!root.children.length)return setTimeout(initReveal,200);
    
    var observer=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting)e.target.classList.add("revealed");
      });
    },{threshold:0.08,rootMargin:"0px 0px -40px 0px"});
    
    function registerSections(parent){
      var target = parent || document;
      target.querySelectorAll("section").forEach(function(s){
        if(!s.classList.contains("reveal-section")) {
          s.classList.add("reveal-section");
          observer.observe(s);
        }
      });
    }
    
    registerSections(root);
    
    var mo=new MutationObserver(function(mutations){
      var addedSection = false;
      mutations.forEach(function(m){
        m.addedNodes.forEach(function(node){
          if(node.nodeType === 1) { // Element node
            if(node.tagName === "SECTION" || node.querySelector("section")) {
              addedSection = true;
            }
          }
        });
      });
      if(addedSection) {
        registerSections(root);
      }
    });
    mo.observe(root,{childList:true,subtree:true});
  }
  initReveal();
})();

// ===== 5. TEXT REVEAL FOR HEADINGS =====
(function(){
  function initTextReveal(){
    var root=document.getElementById("root");
    if(!root||!root.children.length)return setTimeout(initTextReveal,300);
    var headings=root.querySelectorAll("h1,h2,.text-5xl,.text-6xl,.text-7xl");
    headings.forEach(function(h){
      if(h.dataset.textReveal)return;
      h.dataset.textReveal="1";
      h.classList.add("text-reveal");
      var inner=document.createElement("span");
      inner.className="text-reveal-inner";
      while(h.firstChild)inner.appendChild(h.firstChild);
      h.appendChild(inner);
    });
    var observer=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting)e.target.classList.add("revealed");
      });
    },{threshold:0.3});
    root.querySelectorAll(".text-reveal").forEach(function(h){observer.observe(h)});
  }
  initTextReveal();
})();

// ===== 6. MAGNETIC HOVER ON BUTTONS =====
(function(){
  function initMagnetic(){
    var root=document.getElementById("root");
    if(!root||!root.children.length)return setTimeout(initMagnetic,400);
    var btns=root.querySelectorAll("button,a[class*='border']");
    btns.forEach(function(btn){
      if(btn.dataset.magnetic)return;
      btn.dataset.magnetic="1";
      btn.addEventListener("mousemove",function(e){
        var rect=btn.getBoundingClientRect();
        var x=e.clientX-rect.left-rect.width/2;
        var y=e.clientY-rect.top-rect.height/2;
        btn.style.transform="translate("+x*0.15+"px,"+y*0.15+"px)";
      });
      btn.addEventListener("mouseleave",function(){
        btn.style.transform="translate(0,0)";
      });
    });
  }
  initMagnetic();
})();

// ===== 8. PAGE LOAD TRANSITION =====
(function(){
  function liftCurtain(){
    var curtain=document.getElementById("page-curtain");
    if(!curtain)return;
    var root=document.getElementById("root");
    function check(){
      if(root&&root.children.length>0){
        setTimeout(function(){
          curtain.classList.add("lift");
          setTimeout(function(){curtain.remove()},800);
        },300);
      }else{
        setTimeout(check,100);
      }
    }
    check();
  }
  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",liftCurtain);
  }else{
    liftCurtain();
  }
})();

// ===== 9. 3D CARD TILT & SPOTLIGHT EFFECT (EVENT DELEGATION) =====
(function(){
  var currentCard = null;
  
  document.addEventListener("mousemove", function(e){
    var target = e.target;
    if(!target) return;
    
    // Find closest card element
    var card = target.closest("article, a[class*='border'][class*='rounded'], button[class*='border'][class*='rounded'], .glass");
    
    if(currentCard && currentCard !== card) {
      resetCard(currentCard);
      currentCard = null;
    }
    
    if(!card) return;
    
    if(currentCard !== card) {
      currentCard = card;
      card.style.transformStyle = "preserve-3d";
      card.style.transition = "transform 0.1s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.1s ease";
    }
    
    var rect = card.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    
    card.style.setProperty("--mouse-x", x + "px");
    card.style.setProperty("--mouse-y", y + "px");
    
    var px = x / rect.width;
    var py = y / rect.height;
    var tiltX = (0.5 - py) * 8; // Max 8 degrees tilt
    var tiltY = (px - 0.5) * 8;
    
    card.style.transform = "perspective(1000px) rotateX(" + tiltX + "deg) rotateY(" + tiltY + "deg) scale3d(1.015,1.015,1.015)";
  }, {passive: true});
  
  document.addEventListener("mouseleave", function(e){
    if(currentCard) {
      resetCard(currentCard);
      currentCard = null;
    }
  }, {passive: true});
  
  function resetCard(card) {
    card.style.transition = "transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.5s ease";
    card.style.transform = "perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)";
  }
})();



// ===== 10. INJECT 3D FLOATING SPHERES =====
(function() {
  function injectSpheres() {
    var journal = document.getElementById("journal");
    if (journal && !journal.querySelector(".sphere-3d")) {
      var s1 = document.createElement("div");
      s1.className = "sphere-3d";
      s1.style.width = "160px";
      s1.style.height = "160px";
      s1.style.left = "40px";
      s1.style.top = "25%";
      s1.style.animationDuration = "18s";
      journal.appendChild(s1);
    }
    
    var testimonials = document.getElementById("testimonials");
    if (testimonials && !testimonials.querySelector(".sphere-3d")) {
      var s2 = document.createElement("div");
      s2.className = "sphere-3d";
      s2.style.width = "192px";
      s2.style.height = "192px";
      s2.style.right = "48px";
      s2.style.top = "33%";
      s2.style.animationDuration = "22s";
      s2.style.animationName = "float-slower";
      testimonials.appendChild(s2);
    }
    
    var contact = document.getElementById("contact");
    if (contact && !contact.querySelector(".sphere-3d")) {
      var s3 = document.createElement("div");
      s3.className = "sphere-3d";
      s3.style.width = "144px";
      s3.style.height = "144px";
      s3.style.left = "10%";
      s3.style.bottom = "40px";
      s3.style.animationDuration = "16s";
      contact.appendChild(s3);
    }
    
    // Continuous polling handles client-side React re-mounts on route change
    setTimeout(injectSpheres, 1000);
  }
  injectSpheres();
})();
</script>
